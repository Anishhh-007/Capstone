apiVersion: apps/v1
kind: Deployment
metadata:
  name:  router-deployment
  labels:
    name:  router-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: router

  template:
    metadata:
      labels:
        app:  router
    spec:
      containers:
      - image:  router:latest
        imagePullPolicy: IfNotPresent
        name:  router-container
        
        resources:
          limits:
            cpu: "500m"
            memory: "400Mi"
          requests:
            cpu: "250m"
            memory: "200Mi"
        livenessProbe:
          httpGet:
            path: /api/sandbox/healthz
            port: 3000
          initialDelaySeconds: 90
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/sandbox/healthz
            port: 3000
          initialDelaySeconds: 60
          timeoutSeconds: 20
     
        ports:
        - containerPort:  3000
          name:  my-name
